services:
  - type: web
    name: birthday-backend
    runtime: python
    pythonVersion: 3.12
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: PAYHERO_BASE_URL
        value: https://backend.payhero.co.ke/api/v2
      - key: PAYHERO_USERNAME
        sync: false
      - key: PAYHERO_PASSWORD
        sync: false
      - key: PAYHERO_CHANNEL_ID
        sync: false
      - key: PAYHERO_CALLBACK_URL
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
